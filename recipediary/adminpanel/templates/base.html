<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Recipe Diary</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">


    <style>

        body{
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
            overflow-x: hidden;
        }

        /* Sidebar */

        .sidebar{
            height:100vh;
            width:250px;
            background:#1f2937;
            padding-top:20px;
        }

        .sidebar h4{
            color:white;
            text-align:center;
            margin-bottom:30px;
            font-weight:600;
        }

        .sidebar a{
            text-decoration:none;
            display:block;
            padding:12px 20px;
            color:#e5e7eb;
            font-size:15px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#374151;
            color:white;
            padding-left:25px;
        }

        /* Main Content */

        .content-area{
            padding:30px;
            width:100%;
        }

        /* Cards (used in dashboard later) */

        .card{
            border:none;
            border-radius:10px;
            box-shadow:0 3px 10px rgba(0,0,0,0.08);
        }

        /* Tables */

        /* .table{
            background:white;
            border-radius:10px;
            overflow:hidden;
        } */

        .table thead th{  
            font-weight:600;  
            color:#495057;  
        }

        /* Softer borders */
        .table {
            border-color:#f1f3f5;
        }

        /* Smooth hover */
        .table-hover tbody tr:hover{
            background-color:#f8f9fa;
            transition:0.2s;
        }

        /* Better spacing */
        .table td, .table th{
            padding:0.9rem;
        }

        /* Smooth UI feel */
        .card{
            border-radius:12px;
            transition:0.2s ease;
        }

        /* Card hover effect */
        .card:hover{
            transform:translateY(-3px);
            box-shadow:0 6px 20px rgba(0,0,0,0.08);
        }

        /* Table row hover */
        .table-hover tbody tr:hover{
            background-color:#f8fafc;
        }

        /* Button style */
        .btn{
            border-radius:8px;
        }

        /* Pagination style */

        /* .pagination .page-link{
            border-radius:6px;
        } */
        .pagination .page-link {
            color: #212529;
        }

        .pagination .page-link:hover {
            background-color: #e9ecef;
        }

        .pagination .page-item.active .page-link {
            background-color: #343a40;
            border-color: #343a40;
            color: white;
        }








        



        




        
    </style>

</head>

<body>

    <div class="d-flex">

        {% include 'sidebar.html' %}

        <div class="content-area">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</body>
</html>
