{% extends 'base.html' %}

{% block content %}

<div class="card shadow-sm border-0">
<div class="card-body">

<h3 class="mb-4 fw-semibold">Most Viewed Recipes </h3>

<table class="table table-hover align-middle">

<thead class="table-light">
<tr>
<th>Rank</th>
<th>Recipe</th>
<th>Creator</th>
<th>Total Views</th>
</tr>
</thead>

<tbody>
{% for recipe in recipes %}
<tr>
<td>{{ forloop.counter }}</td>
<td>{{ recipe.title }}</td>
<td>{{ recipe.author.name }}</td>
<td class="fw-semibold">{{ recipe.views }}</td>
</tr>
{% endfor %}
</tbody>

</table>

</div>
</div>

{% endblock %}
